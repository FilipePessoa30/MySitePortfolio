<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body {
    margin:0; padding:22px; background:#fff;
    font-family: var(--fp-font-body);
    display:flex; gap:28px; align-items:center; flex-wrap:wrap;
  }
  .stack { display:flex; flex-direction:column; gap:8px; align-items:center; }
  .lbl   { font-family: var(--fp-font-mono); font-size:10px; color: var(--fp-fg-3); letter-spacing:.05em; }

  .avatar-ring {
    width: 64px; height: 64px;
    border-radius: 9999px;
    padding: 3px;
    background: linear-gradient(135deg, #1e4e8c, #0d2648);
    box-shadow: 0 4px 12px -2px rgba(30,78,140,0.25);
    display:block;
  }
  .avatar-ring > img {
    width: 100%; height: 100%;
    border-radius: 9999px;
    object-fit: cover;
    object-position: 42% 16%;
    display:block;
    background:#000;
  }

  .avatar-plain {
    width: 40px; height: 40px;
    border-radius: 9999px;
    object-fit: cover;
    object-position: 42% 16%;
    background:#f5f5f5;
    display:block;
  }

  .card {
    border: 1px solid var(--fp-border);
    border-radius: 14px;
    padding: 12px 16px 12px 12px;
    display:flex; align-items:center; gap:12px;
    background: #fff;
    box-shadow: 0 1px 2px rgba(0,0,0,.03);
  }
  .card .name {
    font-family: var(--fp-font-display);
    font-weight:700; font-size:15px; letter-spacing:-.02em;
    color: var(--fp-fg-1);
  }
  .card .role {
    font-family: var(--fp-font-mono); font-size:10px;
    color: var(--fp-fg-3); letter-spacing:.05em;
    margin-top:2px;
  }
</style></head>
<body>

  <div class="stack">
    <div class="avatar-ring">
      <img src="../assets/filipe-portrait.jpg" alt="Filipe Pessoa"/>
    </div>
    <div class="lbl">Avatar · 64px</div>
  </div>

  <div class="card">
    <img class="avatar-plain" src="../assets/filipe-portrait.jpg" alt="Filipe Pessoa"/>
    <div>
      <div class="name">Filipe Pessoa</div>
      <div class="role">Engenheiro · Programador · Pesquisador</div>
    </div>
  </div>

</body></html>
