<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--fp-font-body)}
.row{display:grid;grid-template-columns:repeat(10,1fr);gap:6px}
.sw{border-radius:6px;overflow:hidden;border:1px solid var(--fp-border);text-align:center}
.sw .chip{height:58px}
.sw .lbl{padding:6px 0;font-family:var(--fp-font-mono);font-size:10px;color:var(--fp-fg-1);background:#fff}
.hex{font-size:9px;color:var(--fp-fg-3);padding-bottom:6px;font-family:var(--fp-font-mono);background:#fff}
</style></head><body>
<div class="row">
  <div class="sw"><div class="chip" style="background:#fafafa"></div><div class="lbl">50</div><div class="hex">#FAFAFA</div></div>
  <div class="sw"><div class="chip" style="background:#f5f5f5"></div><div class="lbl">100</div><div class="hex">#F5F5F5</div></div>
  <div class="sw"><div class="chip" style="background:#e0e0e0"></div><div class="lbl">200</div><div class="hex">#E0E0E0</div></div>
  <div class="sw"><div class="chip" style="background:#cccccc"></div><div class="lbl">300</div><div class="hex">#CCCCCC</div></div>
  <div class="sw"><div class="chip" style="background:#a0a0a0"></div><div class="lbl">400</div><div class="hex">#A0A0A0</div></div>
  <div class="sw"><div class="chip" style="background:#666666"></div><div class="lbl" style="color:#fff;background:#666">500</div><div class="hex">#666</div></div>
  <div class="sw"><div class="chip" style="background:#4a4a4a"></div><div class="lbl" style="color:#fff;background:#4a4a4a">600</div><div class="hex" style="color:#ddd;background:#4a4a4a">#4A4A4A</div></div>
  <div class="sw"><div class="chip" style="background:#2a2a2a"></div><div class="lbl" style="color:#fff;background:#2a2a2a">700</div><div class="hex" style="color:#bbb;background:#2a2a2a">#2A2A2A</div></div>
  <div class="sw"><div class="chip" style="background:#1a1a1a"></div><div class="lbl" style="color:#fff;background:#1a1a1a">800</div><div class="hex" style="color:#aaa;background:#1a1a1a">#1A1A1A</div></div>
  <div class="sw"><div class="chip" style="background:#0a0a0a"></div><div class="lbl" style="color:#fff;background:#0a0a0a">900</div><div class="hex" style="color:#aaa;background:#0a0a0a">#0A0A0A</div></div>
</div>
</body></html>
