<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--fp-font-body)}
label{display:block;font-size:12px;font-weight:600;color:var(--fp-fg-1);margin-bottom:6px}
.in{width:100%;padding:10px 14px;border:1px solid var(--fp-border);border-radius:8px;background:var(--fp-gray-50);font-family:var(--fp-font-body);font-size:14px;color:var(--fp-fg-1);transition:all .2s var(--fp-ease-smooth);box-sizing:border-box}
.in:focus{outline:none;border-color:var(--fp-cyan);background:#fff;box-shadow:0 0 0 3px rgba(0,217,255,.15)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
</style></head><body>
<div style="max-width:500px">
<div class="row">
  <div><label>Nome</label><input class="in" placeholder="Seu nome"/></div>
  <div><label>Email</label><input class="in" placeholder="seu@email.com"/></div>
</div>
<div style="margin-bottom:12px"><label>Assunto</label><input class="in" placeholder="Sobre o que você quer falar?"/></div>
<button class="fp-pill-btn accent fp-shimmer-btn" style="width:100%;justify-content:center">Enviar Mensagem</button>
</div>
</body></html>
