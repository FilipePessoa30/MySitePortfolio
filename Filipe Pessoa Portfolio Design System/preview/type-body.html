<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--fp-font-body)}
.row{padding:6px 0;border-bottom:1px dashed var(--fp-border);display:flex;align-items:baseline;gap:16px}
.row:last-child{border-bottom:0}
.meta{font-family:var(--fp-font-mono);font-size:10px;color:var(--fp-fg-3);min-width:150px;text-transform:uppercase;letter-spacing:.05em}
.spec{color:var(--fp-fg-1);line-height:1.5}
</style></head><body>
<div class="row"><div class="meta">Lead · 18 / 400</div><div class="spec" style="font-size:18px">IBM Plex Sans, legível e calmo.</div></div>
<div class="row"><div class="meta">Body · 16 / 400</div><div class="spec" style="font-size:16px">Especialista em <strong>Computação Científica</strong>, <strong>Otimização</strong> e <strong>IA</strong>.</div></div>
<div class="row"><div class="meta">Small · 14 / 400</div><div class="spec" style="font-size:14px;color:var(--fp-fg-2)">UERJ · 2023–2027 · Bolsista CAPES</div></div>
<div class="row"><div class="meta">Mono · 11 / 700</div><div class="spec fp-mono" style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--fp-fg-3)">SCROLL · STATUS · TAGS</div></div>
</body></html>
