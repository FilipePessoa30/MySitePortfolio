<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:22px;background:#f5f5f5;font-family:var(--fp-font-body)}
.chip{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,#cffafe,#dbeafe);display:flex;align-items:center;justify-content:center;color:#0891b2;font-family:var(--fp-font-mono);font-weight:700}
.tag{display:inline-block;padding:3px 9px;border-radius:999px;background:#ecfeff;color:#0e7490;font-family:var(--fp-font-mono);font-size:11px;margin-right:4px}
.lang{display:inline-block;padding:3px 9px;border-radius:6px;background:#dbeafe;color:#1e40af;font-family:var(--fp-font-mono);font-size:11px;font-weight:600}
</style></head><body>
<div class="fp-card" style="padding:22px;max-width:380px">
  <div style="display:flex;gap:12px;align-items:center;margin-bottom:14px">
    <div class="chip">FP</div>
    <div>
      <h4 style="margin:0;font-family:var(--fp-font-display);font-size:16px">MulticriteriaMicrogrid</h4>
      <div style="font-size:11px;color:var(--fp-fg-3);font-family:var(--fp-font-mono)">github.com/FilipePessoa30</div>
    </div>
  </div>
  <p style="margin:0 0 12px;font-size:13px;color:var(--fp-fg-2);line-height:1.55">Otimização multiobjetivo de microgrids com recursos renováveis.</p>
  <div style="margin-bottom:10px"><span class="tag">Otimização</span><span class="tag">Energia</span></div>
  <span class="lang">Python</span>
</div>
</body></html>
