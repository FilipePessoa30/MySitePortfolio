<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:22px;background:#fff}
.row{padding:6px 0;border-bottom:1px dashed var(--fp-border);display:flex;align-items:baseline;gap:16px}
.row:last-child{border-bottom:0}
.meta{font-family:var(--fp-font-mono);font-size:10px;color:var(--fp-fg-3);min-width:120px;text-transform:uppercase;letter-spacing:.05em}
.spec{font-family:var(--fp-font-display);font-weight:700;letter-spacing:-.02em;color:var(--fp-fg-1);line-height:1.05}
</style></head><body>
<div class="row"><div class="meta">H1 · 72 / 700</div><div class="spec" style="font-size:60px">Space Mono</div></div>
<div class="row"><div class="meta">H2 · 48 / 700</div><div class="spec" style="font-size:40px">Engenheiro</div></div>
<div class="row"><div class="meta">H3 · 24 / 700</div><div class="spec" style="font-size:24px">Projetos & Pesquisa</div></div>
</body></html>
