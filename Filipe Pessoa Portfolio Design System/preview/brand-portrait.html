<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body {
    margin:0; padding:22px; background:#fff;
    font-family: var(--fp-font-body);
    display:flex; gap:28px; align-items:center;
  }

  .portrait-wrap {
    position: relative;
    width: 180px; height: 180px;
    flex-shrink: 0;
  }

  /* Breathing radial glow behind the portrait */
  .glow {
    position: absolute; inset: -28px;
    background: radial-gradient(closest-side,
      rgba(30, 78, 140, 0.45),
      rgba(30, 78, 140, 0.18) 55%,
      transparent 75%);
    filter: blur(22px);
    z-index: 0;
    animation: bp-breathe 4s ease-in-out infinite;
    border-radius: 50%;
  }

  /* Animated gradient ring — tri-color (engineering/programming/research) */
  .ring {
    position: absolute; inset: -3px;
    border-radius: 50%;
    background: linear-gradient(135deg,
      #1e4e8c 0%,    /* blueprint   */
      #0d2648 28%,
      #008f3a 55%,   /* terminal    */
      #6a152f 85%    /* burgundy    */
    );
    background-size: 220% 220%;
    animation: bp-border-shift 10s ease-in-out infinite;
    z-index: 1;
  }

  .frame {
    position: absolute; inset: 0;
    z-index: 2;
    border-radius: 50%;
    overflow: hidden;
    background: #000;
    box-shadow: 0 20px 40px -12px rgba(0,0,0,0.25);
  }
  .frame img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }

  @keyframes bp-breathe {
    0%, 100% { opacity: .55; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.08); }
  }
  @keyframes bp-border-shift {
    0%, 100% { background-position: 0 0; }
    50%      { background-position: 100% 100%; }
  }

  .meta h3 {
    font-family: var(--fp-font-display);
    font-size: 20px; margin: 0 0 4px;
    letter-spacing: -.02em;
    color: var(--fp-fg-1);
  }
  .meta p {
    font-size: 13px; color: var(--fp-fg-2); margin: 0;
    line-height: 1.55; max-width: 360px;
  }
  .meta .role {
    font-family: var(--fp-font-mono);
    font-size: 10px;
    color: #1e4e8c;
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-bottom: 8px;
  }
  .meta .specs {
    margin-top: 12px;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .meta .specs span {
    font-family: var(--fp-font-mono);
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid var(--fp-border);
    color: var(--fp-fg-2);
    background: #fff;
  }
</style></head>
<body>

  <div class="portrait-wrap">
    <div class="glow"></div>
    <div class="ring"></div>
    <div class="frame">
      <img src="../assets/filipe-portrait.jpg" alt="Filipe Pessoa Sousa"/>
    </div>
  </div>

  <div class="meta">
    <div class="role">Retrato principal · Hero</div>
    <h3>Filipe Pessoa Sousa</h3>
    <p>Formato redondo com anel tri-color animado (blueprint · terminal · burgundy) e halo respirando. Mesmo tratamento usado no hero do portfólio.</p>
    <div class="specs">
      <span>180 × 180</span>
      <span>object-position: 20%</span>
      <span>breathe 4s</span>
      <span>ring shift 10s</span>
    </div>
  </div>

</body></html>
