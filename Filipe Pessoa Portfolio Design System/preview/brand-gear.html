<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>body{margin:0;padding:22px;background:#fff;font-family:var(--fp-font-body);display:flex;gap:28px;align-items:center;justify-content:center}
.stack{display:flex;flex-direction:column;align-items:center;gap:6px}
.lbl{font-family:var(--fp-font-mono);font-size:10px;color:var(--fp-fg-3);text-transform:uppercase;letter-spacing:.05em}
</style></head><body>
<div class="stack"><img src="../assets/gear.svg" width="110" class="fp-gear-slow"/><div class="lbl">slow · 60s · cyan</div></div>
<div class="stack"><img src="../assets/gear.svg" width="90" class="fp-gear-medium" style="filter:hue-rotate(200deg)"/><div class="lbl">medium · 40s · orange</div></div>
<div class="stack"><img src="../assets/gear.svg" width="70" class="fp-gear-fast" style="filter:grayscale(1) brightness(.2)"/><div class="lbl">fast · 20s · charcoal</div></div>
</body></html>
